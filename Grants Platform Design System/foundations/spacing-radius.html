<!-- @dsCard group="Spacing" viewport="700x160" name="Radius" subtitle="--radius 10px (cards) · --radius-sm 6px (controls) · 999px (chips)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface); font-family: var(--font); color: var(--ink); }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .box { width: 96px; height: 64px; background: var(--surface-2); border: 1px solid var(--line); }
  .name { font-family: var(--mono); font-size: 0.74rem; margin-top: 8px; }
  .px { font-family: var(--mono); font-size: 0.72rem; color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="row">
    <div><div class="box" style="border-radius:var(--radius)"></div><div class="name">--radius</div><div class="px">10px · cards, board cols</div></div>
    <div><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">--radius-sm</div><div class="px">6px · grant cards, buttons, inputs</div></div>
    <div><div class="box" style="border-radius:999px;width:120px"></div><div class="name">999px</div><div class="px">chips (pill)</div></div>
  </div>
</body>
</html>
