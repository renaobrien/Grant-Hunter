<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals" subtitle="Warm-paper ink, line, and surface ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font); color: var(--ink); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid var(--line); }
  .name { font-family: var(--mono); font-size: 0.74rem; margin-top: 7px; }
  .hex { font-family: var(--mono); font-size: 0.72rem; color: var(--ink-faint); }
  h4 { margin: 0 0 12px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); }
</style>
</head>
<body>
  <h4>Ink · Line · Surface</h4>
  <div class="grid">
    <div><div class="chip" style="background:var(--ink)"></div><div class="name">--ink</div><div class="hex">#1c1d21</div></div>
    <div><div class="chip" style="background:var(--ink-soft)"></div><div class="name">--ink-soft</div><div class="hex">#4a4d55</div></div>
    <div><div class="chip" style="background:var(--ink-faint)"></div><div class="name">--ink-faint</div><div class="hex">#7c808a</div></div>
    <div><div class="chip" style="background:var(--line)"></div><div class="name">--line</div><div class="hex">#e4e2db</div></div>
    <div><div class="chip" style="background:var(--line-soft)"></div><div class="name">--line-soft</div><div class="hex">#efeee9</div></div>
    <div><div class="chip" style="background:var(--surface)"></div><div class="name">--surface</div><div class="hex">#ffffff</div></div>
    <div><div class="chip" style="background:var(--surface-2)"></div><div class="name">--surface-2</div><div class="hex">#faf9f5</div></div>
  </div>
</body>
</html>
