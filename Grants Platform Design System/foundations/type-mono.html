<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface); font-family: var(--font); color: var(--ink); }
  .lbl { font-family: var(--mono); font-size: 0.72rem; color: var(--ink-faint); margin: 0 0 8px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
</style>
</head>
<body>
  <p class="lbl">--mono · inline code + cron</p>
  <div class="row">
    <code>0 12 * * 1</code>
    <span class="chip chip-neutral">Mondays at 12:00 UTC</span>
    <code>settings.daily_budget_usd</code>
  </div>
  <p class="lbl">--mono · block (compiled voice / JSON)</p>
  <pre style="font-family:var(--mono);font-size:0.8rem;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:var(--radius-sm);padding:12px;margin:0;color:var(--ink-soft)">{ "verdict": "survives", "fit_score": 4, "recommendation": "pursue" }</pre>
</body>
</html>
