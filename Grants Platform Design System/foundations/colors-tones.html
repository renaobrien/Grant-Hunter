<!-- @dsCard group="Colors" viewport="700x210" name="Status tones" subtitle="fg + bg pairs — info / good / warn / bad / muted, shown as chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font); color: var(--ink); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tone { border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .dot { width: 22px; height: 22px; border-radius: 6px; margin: 0 auto 8px; }
  .lbl { font-family: var(--mono); font-size: 0.72rem; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  h4 { margin: 0 0 12px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); }
</style>
</head>
<body>
  <h4>Tone pairs (bg fill · fg dot)</h4>
  <div class="grid">
    <div class="tone" style="background:var(--tone-info-bg)"><div class="dot" style="background:var(--tone-info)"></div><div class="lbl" style="color:var(--tone-info)">info</div></div>
    <div class="tone" style="background:var(--tone-good-bg)"><div class="dot" style="background:var(--tone-good)"></div><div class="lbl" style="color:var(--tone-good)">good</div></div>
    <div class="tone" style="background:var(--tone-warn-bg)"><div class="dot" style="background:var(--tone-warn)"></div><div class="lbl" style="color:var(--tone-warn)">warn</div></div>
    <div class="tone" style="background:var(--tone-bad-bg)"><div class="dot" style="background:var(--tone-bad)"></div><div class="lbl" style="color:var(--tone-bad)">bad</div></div>
    <div class="tone" style="background:var(--tone-muted-bg)"><div class="dot" style="background:var(--tone-muted)"></div><div class="lbl" style="color:var(--tone-muted)">muted</div></div>
  </div>
  <div class="chips">
    <span class="chip chip-info">Researching</span>
    <span class="chip chip-good">Pursue</span>
    <span class="chip chip-warn">Maybe</span>
    <span class="chip chip-bad">Error</span>
    <span class="chip chip-muted">Closed</span>
    <span class="chip chip-neutral">Neutral</span>
    <span class="chip chip-brand">Brand</span>
  </div>
</body>
</html>
