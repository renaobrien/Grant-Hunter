<!-- @dsCard group="Components" viewport="700x560" name="Core primitives" subtitle="Card, Chip, StatusChip, ScorePips, EmptyState, FieldRow, Button" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--brand-bg); }
  .grid { display: grid; gap: 20px; max-width: 660px; }
  .spec { display: flex; flex-direction: column; gap: 8px; }
  .spec-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); font-weight: 600; }
  .spec .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Chip, StatusChip, ScorePips, EmptyState, FieldRow, Button } = window.GrantsPlatformDesignSystem_a27f23;

  function Spec({ label, children }) {
    return (
      <div className="spec">
        <div className="spec-label">{label}</div>
        <div className="row">{children}</div>
      </div>
    );
  }

  function Demo() {
    return (
      <div className="grid">
        <Spec label="Button">
          <Button variant="primary">Save settings</Button>
          <Button>Secondary</Button>
          <Button size="sm">← Board</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </Spec>

        <Spec label="Chip — tones">
          <Chip label="Pursue" tone="good" />
          <Chip label="Maybe" tone="warn" />
          <Chip label="Pass" tone="bad" />
          <Chip label="Running" tone="info" />
          <Chip label="Closed" tone="muted" />
          <Chip label="Neutral" tone="neutral" />
          <Chip label="Brand" tone="brand" />
        </Spec>

        <Spec label="StatusChip — grant statuses">
          <StatusChip status="found" />
          <StatusChip status="researching" />
          <StatusChip status="applied" />
          <StatusChip status="awarded" />
          <StatusChip status="dead" />
        </Spec>

        <Spec label="ScorePips">
          <span className="row"><span className="spec-label" style={{textTransform:'none'}}>Fit</span> <ScorePips score={4} /></span>
          <span className="row"><span className="spec-label" style={{textTransform:'none'}}>Align</span> <ScorePips score={2} /></span>
          <span className="row"><span className="spec-label" style={{textTransform:'none'}}>None</span> <ScorePips score={null} /></span>
        </Spec>

        <Card style={{ padding: 'var(--s3)' }}>
          <div className="spec-label" style={{ marginBottom: 8 }}>Card + FieldRow</div>
          <FieldRow label="Recommendation"><Chip label="Pursue" tone="good" /></FieldRow>
          <FieldRow label="Confidence">high</FieldRow>
          <FieldRow label="Fit score"><ScorePips score={5} /></FieldRow>
        </Card>

        <Card className="card-ethos">
          <div className="spec-label" style={{ marginBottom: 8 }}>Card (card-ethos variant)</div>
          <EmptyState title="Nothing here yet" hint="Grants land here as they move through the pipeline." action={<Button variant="primary" size="sm">Run discovery</Button>} />
        </Card>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
