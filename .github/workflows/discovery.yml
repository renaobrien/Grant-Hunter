name: Weekly grant discovery

# Runs the adversarial discovery loop (Finder -> Skeptic -> Judge) on a schedule.
# This is the zero-hosting engine: no server to maintain, it just runs in GitHub.
# Add repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC — matches settings.weekly_cron default
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Never let a manual run overlap the scheduled one (double spend + duplicate debates).
concurrency:
  group: discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # a hung API call must not burn hours of Actions minutes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run discovery
        run: npm run discover
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
