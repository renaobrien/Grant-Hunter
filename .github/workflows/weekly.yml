name: Weekly Grants Digest

on:
  schedule:
    # Monday 13:00 UTC = 8am ET (during DST). 9am ET in winter — close enough.
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      directive:
        description: 'Optional steering note — folded into this run only (e.g. "focus on EU funders this week", "ignore blockchain")'
        required: false
        type: string

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --omit=dev || npm install --omit=dev

      - name: Write Google service account key
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google-service-account.json
          test -s google-service-account.json

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_KEY_FILE: ./google-service-account.json
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          DIRECTIVE: ${{ inputs.directive }}
        run: node index.js
